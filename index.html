<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WeebyHost - Museum</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>
    <a href="avatarwall.html">Go to Avatar Wall ➡️</a>
    <form id="uploadForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="file" id="file" accept=".gltf" required>
        <button type="submit">Add to Museum</button>
    </form>

    <script>
        const REPO = "bacontheoverseer/weeby.net";
        // To trigger dispatch from browser, use a restricted PAT here
        const PAT = "YOUR_DISPATCH_TOKEN"; 

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const file = document.getElementById('file').files[0];
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const content = ev.target.result.split(',')[1];
                await fetch(`https://api.github.com/repos/${REPO}/dispatches`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${PAT}`, 'Accept': 'application/vnd.github.v3+json' },
                    body: JSON.stringify({
                        event_type: 'upload-room',
                        client_payload: { filename: `${document.getElementById('username').value}.gltf`, content: content }
                    })
                });
                alert("Upload sent to GitHub Actions!");
            };
            reader.readAsDataURL(file);
        };
    </script>
</body>
</html>
