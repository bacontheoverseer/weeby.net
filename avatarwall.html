<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WeebyHost - Avatar Wall</title>
</head>
<body>
    <a href="index.html">⬅ Back to Museum</a>
    <form id="avatarForm">
        <input type="text" id="avatarUser" placeholder="Username" required>
        <input type="file" id="avatarFile" accept=".glb" required>
        <button type="submit">Pin Avatar</button>
    </form>

    <script>
        const REPO = "bacontheoverseer/weeby.net";
        const PAT = "YOUR_DISPATCH_TOKEN";

        document.getElementById('avatarForm').onsubmit = async (e) => {
            e.preventDefault();
            const file = document.getElementById('avatarFile').files[0];
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const content = ev.target.result.split(',')[1];
                await fetch(`https://api.github.com/repos/${REPO}/dispatches`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${PAT}`, 'Accept': 'application/vnd.github.v3+json' },
                    body: JSON.stringify({
                        event_type: 'upload-avatar',
                        client_payload: { filename: `avatar_${document.getElementById('avatarUser').value}.glb`, content: content }
                    })
                });
                alert("Avatar upload triggered via Action!");
            };
            reader.readAsDataURL(file);
        };
    </script>
</body>
</html>
